; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================================
; Common Configuration (shared between TFT and LVGL builds)
; ============================================================================
[env]
platform = espressif32@6.5.0
board = lilygo-t-display-s3
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_build.partitions = partitions_16mb_ota.csv
board_build.arduino.memory_type = qio_opi
framework = arduino
board_build.filesystem = littlefs

; Build script to generate dynamic firmware metadata and version handling
extra_scripts = pre:../esp32common/scripts/version_firmware.py

; Reference shared library folder (ESP-NOW common structures)
lib_extra_dirs = ../esp32common

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_rts = 0
monitor_dtr = 0

; ============================================================================
; TFT Environment (Pure TFT-eSPI - Synchronous rendering)
; ============================================================================
[env:lilygo-t-display-s3_tft]
extends = env

; TFT library + shared dependencies (no LVGL)
lib_deps = 
    knolleary/PubSubClient@^2.8
    bodmer/TFT_eSPI @ ^2.5.43
    bodmer/JPEGDecoder @ ^1.8.0
    bblanchon/ArduinoJson @ ^6.21.5

; TFT-specific build flags
build_flags = 
    -I ../esp32common
    -I src/hal
    ; Device identification for firmware versioning
    -D RECEIVER_DEVICE
    -D FW_VERSION_MAJOR=2
    -D FW_VERSION_MINOR=0
    -D FW_VERSION_PATCH=0
    ; NOTE: Do not override CONFIG_HTTPD_MAX_* to avoid
    ; macro redefinition warning spam from sdkconfig.h during compilation.
    ; Metadata embedding
    -D TARGET_DEVICE=RECEIVER
    ; TFT Configuration
    -D USE_TFT=1
    -D USER_SETUP_LOADED=1
    -include src/hal/tft_espi_user_setup.h
    ; ESP32-S3 configuration
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -Wno-deprecated-declarations
    -Wno-builtin-macro-redefined
    -Wno-cpp
    ; Logging control
    -D COMPILE_LOG_LEVEL=LOG_INFO

; Exclude LVGL-specific files (use TFT versions only)
build_src_filter = 
    +<*> 
    -<display/display_core_lvgl.cpp>
    -<display/display_splash_lvgl.cpp>
    -<display/pages/status_page_lvgl.cpp>
    -<display/widgets/power_widget_lvgl.cpp>
    -<display/widgets/soc_widget_lvgl.cpp>
    -<display/display_core.cpp>
    -<display/display_splash.cpp>
    -<display/lvgl_impl/*>
    -<hal/display/lvgl_driver.cpp>

; ============================================================================
; LVGL Environment (New Implementation - Compile-time alternative)
; ============================================================================
[env:lilygo-t-display-s3_lvgl]
extends = env

; LVGL library + shared dependencies
lib_deps = 
    knolleary/PubSubClient@^2.8
    bodmer/TFT_eSPI @ ^2.5.43
    bodmer/JPEGDecoder @ ^1.8.0
    bblanchon/ArduinoJson @ ^6.21.5
    lvgl/lvgl @ ^8.3.11

; LVGL-specific build flags
build_flags = 
    -I ../esp32common
    -I src/hal
    ; Device identification for firmware versioning
    -D RECEIVER_DEVICE
    -D FW_VERSION_MAJOR=2
    -D FW_VERSION_MINOR=0
    -D FW_VERSION_PATCH=0
    ; NOTE: Do not override CONFIG_HTTPD_MAX_* in LVGL env to avoid
    ; macro redefinition warning spam from sdkconfig.h during compilation.
    ; Metadata embedding - PIO_ENV_NAME and BUILD_DATE are generated dynamically by version_firmware.py
    -D TARGET_DEVICE=RECEIVER
    ; LVGL Configuration
    -D USE_LVGL=1
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LV_CONF_PATH="${PROJECT_DIR}/src/lv_conf.h"
    ; TFT_eSPI still needed for low-level driver (LVGL uses it)
    -D USER_SETUP_LOADED=1
    -include src/hal/tft_espi_user_setup.h
    ; ESP32-S3 configuration
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -Wno-deprecated-declarations
    -Wno-builtin-macro-redefined
    -Wno-cpp
    ; Logging control - set compile-time log level
    ; LOG_NONE=0, LOG_ERROR=1, LOG_WARN=2, LOG_INFO=3, LOG_DEBUG=4, LOG_TRACE=5
    -D COMPILE_LOG_LEVEL=LOG_INFO

; Exclude TFT-specific display_core.cpp (LVGL uses display_core_lvgl.cpp instead)
build_src_filter = 
    +<*> 
    -<display/display_core.cpp>
    -<display/display_core_lvgl.cpp>
    -<display/display_splash.cpp>

; ============================================================================
; TFT_eSPI Environment (Current Implementation)
; ============================================================================
[env:lilygo-t-display-s3]
extends = env
platform = espressif32@6.5.0
board = lilygo-t-display-s3
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_build.partitions = partitions_16mb_ota.csv
board_build.arduino.memory_type = qio_opi
framework = arduino
board_build.filesystem = littlefs

; Build script to generate dynamic firmware metadata and version handling
extra_scripts = pre:../esp32common/scripts/version_firmware.py

; Reference shared library folder (ESP-NOW common structures)
lib_extra_dirs = ../esp32common

; TFT_eSPI library is the official library used in LilyGo examples
; JPEGDecoder for splash screen support
lib_deps = 
    knolleary/PubSubClient@^2.8
    bodmer/TFT_eSPI @ ^2.5.43
    bodmer/JPEGDecoder @ ^1.8.0
    bblanchon/ArduinoJson @ ^6.21.5

; Build flags - Hardware configuration centralized in src/hal/
build_flags = 
    -I ../esp32common
    -I src/hal
    ; Device identification for firmware versioning
    -D RECEIVER_DEVICE
    -D FW_VERSION_MAJOR=2
    -D FW_VERSION_MINOR=0
    -D FW_VERSION_PATCH=0
    ; HTTP server configuration for battery data (redefines SDK defaults - warnings are harmless)
    -D CONFIG_HTTPD_MAX_URI_LEN=1024
    -D CONFIG_HTTPD_MAX_REQ_HDR_LEN=2048
    ; Metadata embedding - PIO_ENV_NAME and BUILD_DATE are generated dynamically by version_firmware.py
    -D TARGET_DEVICE=RECEIVER
    ; TFT_eSPI configuration - Use project HAL instead of build flags
    -D USER_SETUP_LOADED=1
    -include src/hal/tft_espi_user_setup.h
    ; ESP32-S3 configuration
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -Wno-deprecated-declarations
    -Wno-builtin-macro-redefined
    -Wno-cpp
    ; Logging control - set compile-time log level
    ; LOG_NONE=0, LOG_ERROR=1, LOG_WARN=2, LOG_INFO=3, LOG_DEBUG=4, LOG_TRACE=5
    -D COMPILE_LOG_LEVEL=LOG_INFO

; Exclude LVGL source files from TFT build
build_src_filter = 
    +<*> 
    -<display/display_core_lvgl.cpp>
    -<display/display_splash_lvgl.cpp>
    -<display/pages/status_page_lvgl.cpp>
    -<display/widgets/soc_widget_lvgl.cpp>
    -<display/widgets/power_widget_lvgl.cpp>
    -<hal/display/lvgl_driver.cpp>

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_rts = 0
monitor_dtr = 0
